<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>WaterBridge Messenger</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Pretendard,sans-serif;
}

body{
height:100vh;
display:flex;
background:#f5f6f8;
overflow:hidden;
}

/* 왼쪽 */

.sidebar{
width:320px;
background:#fff;
border-right:1px solid #ddd;
display:flex;
flex-direction:column;
}

.logo{
height:70px;
display:flex;
align-items:center;
padding:20px;
font-size:22px;
font-weight:700;
}

.search{
padding:10px;
}

.search input{
width:100%;
padding:10px;
border:none;
background:#f1f1f1;
border-radius:10px;
}

.user-list{
flex:1;
overflow:auto;
}

.user{
padding:15px;
display:flex;
gap:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.user:hover{
background:#f8f8f8;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:#1e88e5;
}

.info{
flex:1;
}

.name{
font-weight:600;
}

.last{
font-size:12px;
color:#777;
}

/* 가운데 */

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.chat-header{
height:70px;
background:#fff;
border-bottom:1px solid #ddd;
display:flex;
align-items:center;
padding:0 20px;
font-weight:700;
}

.messages{
flex:1;
padding:20px;
overflow:auto;
}

.msg{
max-width:60%;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

.user-msg{
background:#fff;
}

.admin-msg{
background:#ffeb3b;
margin-left:auto;
}

.input-box{
height:80px;
background:#fff;
border-top:1px solid #ddd;
display:flex;
padding:10px;
gap:10px;
}

.input-box input{
flex:1;
border:none;
background:#f1f1f1;
border-radius:10px;
padding:15px;
}

.input-box button{
width:120px;
border:none;
background:#1e88e5;
color:#fff;
border-radius:10px;
cursor:pointer;
}

/* 오른쪽 */

.profile{
width:300px;
background:#fff;
border-left:1px solid #ddd;
padding:20px;
}

.profile h3{
margin-bottom:20px;
}

.card{
background:#f5f6f8;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
WATERBRIDGE
</div>

<div class="search">
<input placeholder="고객 검색">
</div>

<div id="userList" class="user-list">
</div>

</div>

<div class="chat">

<div id="chatHeader" class="chat-header">
채팅방 선택
</div>

<div id="messages" class="messages">
</div>

<div class="input-box">
<input id="msgInput" placeholder="메시지 입력">
<button id="sendBtn">전송</button>
</div>

</div>

<div class="profile">

<h3>고객정보</h3>

<div class="card">
이름 : <span id="pName">-</span>
</div>

<div class="card">
상태 : <span id="pStatus">-</span>
</div>

<div class="card">
메모 : VIP 고객
</div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const socket = io(
"https://waterbridge-chat-server-production.up.railway.app"
);

let currentUser=null;

socket.emit("adminJoin");

const userList=document.getElementById("userList");
const messages=document.getElementById("messages");

socket.on("userOnline",(id)=>{

const div=document.createElement("div");

div.className="user";

div.innerHTML=`
<div class="avatar"></div>
<div class="info">
<div class="name">${id}</div>
<div class="last">온라인</div>
</div>
`;

div.onclick=()=>{

currentUser=id;

document.getElementById("chatHeader")
.innerText=id;

document.getElementById("pName")
.innerText=id;

document.getElementById("pStatus")
.innerText="온라인";

messages.innerHTML="";
};

userList.appendChild(div);

});

socket.on("message",(data)=>{

if(currentUser!==data.userId) return;

messages.innerHTML+=`
<div class="msg user-msg">
${data.message}
</div>
`;

messages.scrollTop=messages.scrollHeight;

});

document.getElementById("sendBtn")
.addEventListener("click",()=>{

const text=
document.getElementById("msgInput").value;

if(!text||!currentUser) return;

socket.emit("adminMessage",{
userId:currentUser,
message:text
});

messages.innerHTML+=`
<div class="msg admin-msg">
${text}
</div>
`;

document.getElementById("msgInput").value="";

});

</script>

</body>
</html>
